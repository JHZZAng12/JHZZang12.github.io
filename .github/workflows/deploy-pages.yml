name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create runtime config
        env:
          SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Missing github-pages environment secrets: PUBLIC_SUPABASE_URL or PUBLIC_SUPABASE_ANON_KEY"
            exit 1
          fi

          cat > board/config.js <<EOF
          window.BOARD_CONFIG = Object.freeze({
            supabaseUrl: "$SUPABASE_URL",
            supabaseAnonKey: "$SUPABASE_ANON_KEY"
          });
          EOF

      - name: Write deploy summary
        env:
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          REPOSITORY_NAME: ${{ github.event.repository.name }}
        run: |
          owner="${REPOSITORY_OWNER,,}"
          repo="$REPOSITORY_NAME"

          if [ "$repo" = "${owner}.github.io" ]; then
            site_url="https://${owner}.github.io"
          else
            site_url="https://${owner}.github.io/${repo}"
          fi

          {
            echo "### GitHub Pages deploy target"
            echo
            echo "- Site: ${site_url}"
            echo "- Board: ${site_url}/board/"
            echo "- Required environment secrets: PUBLIC_SUPABASE_URL, PUBLIC_SUPABASE_ANON_KEY"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
